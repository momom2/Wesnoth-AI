# _main.cfg
# Main entry point for wesnoth_ai add-on
# This file tells Wesnoth to load the training scenario

#textdomain wesnoth-wesnoth_ai

[binary_path]
    path=data/add-ons/wesnoth_ai
[/binary_path]

# Load the training scenario.
# [test] ai_training is the active path — `wesnoth --test ai_training`
# is what wesnoth_interface.py launches. The MP variant lives at
# training_scenario_mp.cfg as a dormant artifact of the prior headless
# experiment (see lua/headless_plugin.lua and lua/headless_probe.lua
# for investigation notes). Re-enable by swapping the include if/when
# we revisit that path.
{~add-ons/wesnoth_ai/scenarios/training_scenario.cfg}