# _main.cfg
# Main entry point for wesnoth_ai add-on
# This file tells Wesnoth to load the training scenario

#textdomain wesnoth-wesnoth_ai

[binary_path]
    path=data/add-ons/wesnoth_ai
[/binary_path]

# Eval scenarios for tools/eval_vs_builtin.py. The training_scenario.cfg
# remains as the boilerplate ai_training scenario the Lua side uses;
# 2026-05-11 retired the live-Wesnoth training path (now sim-based)
# and `--display` mode + training_scenario_display.cfg. The remaining
# consumer is `tools/eval_vs_builtin.py` which loads eval/*.cfg
# scenarios via `wesnoth --test eval_<id>`.
{~add-ons/wesnoth_ai/scenarios/training_scenario.cfg}

# Auto-generated eval scenarios. Pre-loaded so they're
# available via `wesnoth --test eval_<id>`. Empty until
# tools/eval_vs_builtin.py runs.
{~add-ons/wesnoth_ai/scenarios/eval/}

# Capability drills: tiny [multiplayer] scenarios used by the sim's
# DRILL training pool (tools/scenario_pool.py DRILL_SCENARIO_IDS)
# and loadable in the real game for manual inspection. Templates
# are generated from these by tools/build_scenario_templates.py
# via the game's own preprocessor.
{~add-ons/wesnoth_ai/scenarios/drills/}
