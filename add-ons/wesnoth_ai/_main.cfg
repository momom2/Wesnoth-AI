# _main.cfg
# Main entry point for wesnoth_ai add-on
# This file tells Wesnoth to load the training scenario

#textdomain wesnoth-wesnoth_ai

[binary_path]
    path=data/add-ons/wesnoth_ai
[/binary_path]

# Load the training scenario.
# [test] ai_training is what `--test ai_training` runs.
# The MP variant at training_scenario_mp.cfg is dormant — kept as a
# file for a future headless experiment via wesnothd + --plugin
# (see lua/headless_plugin.lua and lua/headless_probe.lua for prior
# investigation notes). Re-enable by uncommenting the second include
# if/when we revisit that path.
{~add-ons/wesnoth_ai/scenarios/training_scenario.cfg}
# {~add-ons/wesnoth_ai/scenarios/training_scenario_mp.cfg}
