# _main.cfg
# Main entry point for wesnoth_ai add-on
# This file tells Wesnoth to load the training scenario

#textdomain wesnoth-wesnoth_ai

[binary_path]
    path=data/add-ons/wesnoth_ai
[/binary_path]

# Load the self-play scenarios.
# [test] ai_training is what `wesnoth --test ai_training` runs (the
# fast-turbo, no-animations training variant). [test] ai_display has
# the same map/sides but the Lua side picks slow-turbo + animations
# on by inspecting wesnoth.current.scenario -- meant for human-watching
# a single game from a trained checkpoint, not for training runs.
# The MP variant lives at training_scenario_mp.cfg as a dormant
# artifact of the prior headless experiment.
{~add-ons/wesnoth_ai/scenarios/training_scenario.cfg}
{~add-ons/wesnoth_ai/scenarios/training_scenario_display.cfg}

# Auto-generated eval scenarios. Pre-loaded so they're
# available via `wesnoth --test eval_<id>`. Empty until
# tools/eval_vs_builtin.py runs.
{~add-ons/wesnoth_ai/scenarios/eval/}
