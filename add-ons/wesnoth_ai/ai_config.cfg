# ai_config.cfg
# AI wiring for the external Python controller. We use a CUSTOM Lua
# stage (not a candidate action) to avoid Wesnoth's RCA blacklist-on-
# failure rule — rejected actions there would end the turn after one
# attempt, which is unworkable for a training policy that'll pick many
# illegal actions early on.
#
# The [engine] block loads turn_stage.lua as the side's Lua engine.
# The [stage] block calls `(...):run_turn()` where `(...)` is the
# module returned by the engine code. See turn_stage.lua for the loop.

[ai]
    id=external_python_ai
    description="External Python AI"

    [engine]
        name="lua"
        code=<<
            return wesnoth.require("~add-ons/wesnoth_ai/lua/turn_stage.lua")
        >>
    [/engine]

    [stage]
        id=external_python_turn
        engine="lua"
        code="(...):run_turn()"
    [/stage]
[/ai]
