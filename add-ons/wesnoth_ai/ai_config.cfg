# ai_config.cfg
# AI wiring for the external Python controller. One Lua candidate action
# drives a state→action loop per AI iteration; see ca_turn_loop.lua for
# the full protocol.

[ai]
    id=external_python_ai
    description="External Python AI"

    [stage]
        id=main_loop
        name=ai_default_rca::candidate_action_evaluation_loop

        [candidate_action]
            engine=lua
            name=turn_loop
            max_score=999990
            location="~add-ons/wesnoth_ai/lua/ca_turn_loop.lua"
        [/candidate_action]
    [/stage]
[/ai]
