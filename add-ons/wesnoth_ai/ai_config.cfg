# ai_config.cfg
# AI configuration for external Python control
# This sets up two Lua CAs that communicate via files

[ai]
    id=external_python_ai
    description="External Python AI"
    
    [stage]
        id=main_loop
        name=ai_default_rca::candidate_action_evaluation_loop
        
        # First CA: Send state to Python (high priority, blacklists after execution)
        [candidate_action]
            engine=lua
            name=state_sender
            max_score=999990
            location="~add-ons/wesnoth_ai/lua/ca_state_sender.lua"
        [/candidate_action]
        
        # Second CA: Receive and execute actions from Python
        [candidate_action]
            engine=lua
            name=action_executor
            max_score=999980
            location="~add-ons/wesnoth_ai/lua/ca_action_executor.lua"
        [/candidate_action]
    [/stage]
[/ai]
