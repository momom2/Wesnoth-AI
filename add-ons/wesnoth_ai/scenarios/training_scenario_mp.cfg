# training_scenario_mp.cfg
# Multiplayer variant of training_scenario.cfg, prepared for the
# headless / multi-game-per-process speedup experiment.
#
# NOT loaded by _main.cfg by default — it's inert until we flip the
# include. Two uses:
#
#  (a) With --nogui + --multiplayer + --multiplayer-repeat N, one
#      Wesnoth process boots once and plays N games back-to-back,
#      saving ~10 s × (N-1) in boot overhead per N-game batch.
#
#  (b) With --nogui alone, no GUI window renders at all — even at
#      turbo_speed=8 the current --test mode still spends cycles on
#      the SDL frame loop. Skipping it entirely should be a 2–4×
#      win.
#
# Required launch command (verified against Arch manpage):
#
#     wesnoth.exe --nogui --multiplayer \
#                 --scenario=ai_training_mp \
#                 --era=era_default \
#                 --controller 1:ai --controller 2:ai \
#                 --side 1:"Knalgan Alliance" --side 2:Drakes \
#                 --multiplayer-repeat N \
#                 --exit-at-end --nosound --nomusic
#
# Faction IDs are from data/multiplayer/factions/knalgans-default.cfg
# and drakes-default.cfg — confirmed present in the Steam install.
#
# The previous headless attempt failed because it was missing
# --era / --controller / --side (Wesnoth then couldn't resolve the
# multiplayer setup and silently waited for a lobby OR bailed with
# --exit-at-end). See memory/reference_wesnoth_headless_attempt.md.

#textdomain wesnoth-wesnoth_ai

[multiplayer]
    id=ai_training_mp
    name="AI Training - Caves of the Basilisk (MP)"
    description="Headless self-play training scenario."

    map_file="multiplayer/maps/2p_Caves_of_the_Basilisk.map"

    allow_new_game=no            # don't list in the normal MP browser
    random_start_time=no         # deterministic-ish for debugging

    {DEFAULT_SCHEDULE}
    turns=-1
    victory_when_enemies_defeated=yes

    [side]
        side=1
        controller=ai
        save_id=knalgan_side
        team_name=knalgan
        user_team_name="Knalgan Alliance"
        type=Dwarvish Fighter
        id=knalgan_leader
        name="Knalgan Leader"
        canrecruit=yes
        recruit=Dwarvish Guardsman, Dwarvish Fighter, Dwarvish Ulfserker, Dwarvish Thunderer, Thief, Poacher, Footpad, Gryphon Rider
        gold=100
        village_gold=2
        income=0
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]

    [side]
        side=2
        controller=ai
        save_id=drake_side
        team_name=drakes
        user_team_name="Drakes"
        type=Drake Clasher
        id=drake_leader
        name="Drake Leader"
        canrecruit=yes
        recruit=Drake Burner, Drake Clasher, Drake Glider, Drake Fighter, Saurian Skirmisher, Saurian Augur
        gold=100
        village_gold=2
        income=0
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]

    # Events — IDENTICAL to [test] version. If the [test] flow works,
    # these work, because Wesnoth evaluates scenario events the same
    # way regardless of the outer tag.

    [event]
        name=preload
        first_time_only=yes

        [lua]
            code=<<
                math.randomseed(os.time() + math.floor(os.clock() * 1000000))
                local game_id = string.format("g%09d", math.random(1, 999999999))
                wml.variables.game_id = game_id
                std_print("=== AI Training Scenario Starting ===")
                std_print("Game ID: " .. game_id)
            >>
        [/lua]
    [/event]

    [event]
        name=turn refresh
        first_time_only=no

        [lua]
            code=<<
                std_print(string.format("=== Turn %d, Side %d ===",
                    wesnoth.current.turn, wesnoth.current.side))
            >>
        [/lua]
    [/event]

    [event]
        name=die
        first_time_only=no

        [filter]
            canrecruit=yes
        [/filter]

        [lua]
            code=<<
                local dead_leader = wesnoth.current.event_context.unit
                std_print(string.format("Leader of side %d has died!", dead_leader.side))

                local remaining_leaders = wesnoth.units.find_on_map({canrecruit = true})
                if #remaining_leaders <= 1 then
                    std_print("=== GAME OVER ===")
                    local winner = 0
                    if #remaining_leaders == 1 then
                        winner = remaining_leaders[1].side
                    end
                    std_print(tostring(winner))
                    wesnoth.wml_actions.endlevel({
                        result = "victory",
                        bonus = false,
                        carryover_percentage = 0
                    })
                end
            >>
        [/lua]
    [/event]

    [event]
        name=victory

        [lua]
            code=<<
                std_print("=== Scenario Complete ===")
            >>
        [/lua]
    [/event]
[/multiplayer]
