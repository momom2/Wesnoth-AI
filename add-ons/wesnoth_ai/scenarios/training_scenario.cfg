# training_scenario.cfg
# Training scenario for Wesnoth AI
# Map: Caves of the Basilisk
# Factions: Knalgan Alliance vs Drakes

[test]
    id=ai_training
    name="AI Training - Caves of the Basilisk"
    
    map_file="multiplayer/maps/2p_Caves_of_the_Basilisk.map"
    
    {DEFAULT_SCHEDULE}
    turns=-1  # Unlimited turns (will be ended by AI)
    victory_when_enemies_defeated=yes
    
    # Side 1: Knalgan Alliance (controlled by Python AI)
    [side]
        side=1
        controller=ai
        save_id=knalgan_side
        
        team_name=knalgan
        user_team_name="Knalgan Alliance"
        
        type=Dwarvish Fighter
        id=knalgan_leader
        name="Knalgan Leader"
        canrecruit=yes
        
        recruit=Dwarvish Guardsman, Dwarvish Fighter, Dwarvish Ulfserker, Dwarvish Thunderer, Thief, Poacher, Footpad, Gryphon Rider
        
        gold=100
        village_gold=2
        income=0
        
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]
    
    # Side 2: Drakes (controlled by Python AI)
    [side]
        side=2
        controller=ai
        save_id=drake_side
        
        team_name=drakes
        user_team_name="Drakes"
        
        type=Drake Clasher
        id=drake_leader
        name="Drake Leader"
        canrecruit=yes
        
        recruit=Drake Burner, Drake Clasher, Drake Glider, Drake Fighter, Saurian Skirmisher, Saurian Augur
        
        gold=100
        village_gold=2
        income=0
        
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]
    
    # Initialize game on scenario start - read game_id from file
    [event]
        name=preload
        first_time_only=yes
        
        [lua]
            code=<<
                -- Discover the game_id Python wrote before launching us.
                -- Wesnoth 1.18's Lua sandbox excludes io.open, so we use
                -- wesnoth.read_file instead. It accepts the ~add-ons/
                -- prefix and resolves via the installed add-on path.
                local game_id = "game_0"  -- fallback if no marker is found
                for i = 0, 99 do
                    local candidate = "game_" .. i
                    local path = "~add-ons/wesnoth_ai/games/" .. candidate .. "/game_id.txt"
                    if wesnoth.have_file(path) then
                        local content = wesnoth.read_file(path)
                        if content and content:match("^game_%d+") then
                            game_id = content:match("^game_%d+")
                            break
                        end
                    end
                end

                wml.variables.game_id = game_id
                std_print("=== AI Training Scenario Starting ===")
                std_print("Game ID: " .. game_id)
            >>
        [/lua]
    [/event]
    
    # Log turn starts
    [event]
        name=turn refresh
        first_time_only=no
        
        [lua]
            code=<<
                std_print(string.format("=== Turn %d, Side %d ===", 
                    wesnoth.current.turn, wesnoth.current.side))
            >>
        [/lua]
    [/event]
    
    # Detect game over
    [event]
        name=die
        first_time_only=no
        
        [filter]
            canrecruit=yes
        [/filter]
        
        [lua]
            code=<<
                local dead_leader = wesnoth.current.event_context.unit
                std_print(string.format("Leader of side %d has died!", dead_leader.side))
                
                -- Check if this ends the game
                local remaining_leaders = wesnoth.units.find_on_map({canrecruit = true})
                if #remaining_leaders <= 1 then
                    std_print("=== GAME OVER ===")
                    
                    -- Determine winner
                    local winner = 0
                    if #remaining_leaders == 1 then
                        winner = remaining_leaders[1].side
                    end
                    
                    std_print(tostring(winner))
                    
                    -- End scenario
                    wesnoth.wml_actions.endlevel({
                        result = "victory",
                        bonus = false,
                        carryover_percentage = 0
                    })
                end
            >>
        [/lua]
    [/event]
    
    # Handle victory
    [event]
        name=victory
        
        [lua]
            code=<<
                std_print("=== Scenario Complete ===")
            >>
        [/lua]
    [/event]
[/test]
