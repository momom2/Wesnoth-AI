# training_scenario.cfg
# Training scenario for Wesnoth AI.
# Map: Caves of the Basilisk. Factions: Knalgan Alliance vs Drakes.
#
# Wrapped in [test] rather than [multiplayer] because `--nogui` with
# `--multiplayer` did not work reliably on this Windows/Wesnoth 1.18
# setup (see memory/reference_wesnoth_headless_attempt.md). Keep in
# --test mode; GUI window opens but training works. Headless is a
# future optimization.

[test]
    id=ai_training
    name="AI Training - Caves of the Basilisk"

    map_file="multiplayer/maps/2p_Caves_of_the_Basilisk.map"

    {DEFAULT_SCHEDULE}
    turns=-1  # Unlimited turns (will be ended by AI)
    victory_when_enemies_defeated=yes
    
    # Side 1: Knalgan Alliance (controlled by Python AI)
    [side]
        side=1
        controller=ai
        save_id=knalgan_side
        
        team_name=knalgan
        user_team_name="Knalgan Alliance"
        
        type=Dwarvish Fighter
        id=knalgan_leader
        name="Knalgan Leader"
        canrecruit=yes
        
        recruit=Dwarvish Guardsman, Dwarvish Fighter, Dwarvish Ulfserker, Dwarvish Thunderer, Thief, Poacher, Footpad, Gryphon Rider
        
        gold=100
        village_gold=2
        income=0
        
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]
    
    # Side 2: Drakes (controlled by Python AI)
    [side]
        side=2
        controller=ai
        save_id=drake_side
        
        team_name=drakes
        user_team_name="Drakes"
        
        type=Drake Clasher
        id=drake_leader
        name="Drake Leader"
        canrecruit=yes
        
        recruit=Drake Burner, Drake Clasher, Drake Glider, Drake Fighter, Saurian Skirmisher, Saurian Augur
        
        gold=100
        village_gold=2
        income=0
        
        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]
    
    # Generate a unique game_id for this Wesnoth process. Python
    # discovers it by parsing the first state frame's `game_id` field,
    # then creates the corresponding per-game IPC dir. Avoids the
    # file-based-discovery race that bit multi-game batches: the old
    # scheme scanned `games/game_0..game_99/game_id.txt` and picked
    # the first match, so every Wesnoth process in a training batch
    # thought it was "game_0".
    [event]
        name=preload
        first_time_only=yes

        [lua]
            code=<<
                -- Seed from os.time + os.clock so two Wesnoths launched
                -- within the same second still get different ids. This
                -- is the vanilla Lua math.random, NOT Wesnoth's synced
                -- random — fine for a process-local identifier.
                math.randomseed(os.time() + math.floor(os.clock() * 1000000))
                local game_id = string.format("g%09d", math.random(1, 999999999))
                wml.variables.game_id = game_id
                std_print("=== AI Training Scenario Starting ===")
                std_print("Game ID: " .. game_id)
            >>
        [/lua]
    [/event]
    
    # Marker in Wesnoth's .out.log so turn boundaries are easy to spot
    # when reading the log. The per-turn work itself lives in the AI
    # engine (turn_stage.lua), which runs automatically each side-turn.
    [event]
        name=turn refresh
        first_time_only=no

        [lua]
            code=<<
                std_print(string.format("=== Turn %d, Side %d ===",
                    wesnoth.current.turn, wesnoth.current.side))
            >>
        [/lua]
    [/event]
    
    # Detect game over
    [event]
        name=die
        first_time_only=no
        
        [filter]
            canrecruit=yes
        [/filter]
        
        [lua]
            code=<<
                local dead_leader = wesnoth.current.event_context.unit
                std_print(string.format("Leader of side %d has died!", dead_leader.side))
                
                -- Check if this ends the game
                local remaining_leaders = wesnoth.units.find_on_map({canrecruit = true})
                if #remaining_leaders <= 1 then
                    std_print("=== GAME OVER ===")
                    
                    -- Determine winner
                    local winner = 0
                    if #remaining_leaders == 1 then
                        winner = remaining_leaders[1].side
                    end
                    
                    std_print(tostring(winner))
                    
                    -- End scenario
                    wesnoth.wml_actions.endlevel({
                        result = "victory",
                        bonus = false,
                        carryover_percentage = 0
                    })
                end
            >>
        [/lua]
    [/event]
    
    # Handle victory
    [event]
        name=victory

        [lua]
            code=<<
                std_print("=== Scenario Complete ===")
            >>
        [/lua]
    [/event]
[/test]
