# Capability drill: village economy race. 8 villages on an 11x8
# field, corner keeps, 40 starting gold (~3 recruits), no placed
# armies. Short games end at the turn cap, where the draw
# tiebreaker (village + gold differentials) provides the signal.
# Isolates: expansion order, village denial, income arithmetic.
[multiplayer]
id=drill_village_rush
name="Drill: Village Rush"
description="wesnoth_ai capability drill: race for 8 villages, light recruiting."

map_data="{~add-ons/wesnoth_ai/maps/drill_village_rush.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

[side]
side=1
team_name=1
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[side]
side=2
team_name=2
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[/multiplayer]
