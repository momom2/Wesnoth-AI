# Capability drill: single-hex chokepoint. An impassable mountain
# wall splits the field; the only crossing is the one-hex gap at
# the center row. Both sides field the same fixed dwarf trio
# (2x Fighter + Thunderer), no recruiting. Isolates: funnel
# fighting, ZoC blocking, holding vs forcing a pass, when to
# rotate wounded defenders onto the flanking villages.
#
# Pre-placed units carry random_traits=no: the sim's unit model is
# trait-less for placed units, and Wesnoth playback must match it.
[multiplayer]
id=drill_chokepoint
name="Drill: Chokepoint"
description="wesnoth_ai capability drill: force or hold a one-hex mountain pass."

map_data="{~add-ons/wesnoth_ai/maps/drill_chokepoint.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

[side]
side=1
team_name=1
controller=human
canrecruit=yes
gold=0
income=0
fog=no
village_gold=2
team_lock=yes
[unit]
    type=Dwarvish Fighter
    side=1
    x=5
    y=3
    random_traits=no
[/unit]
[unit]
    type=Dwarvish Fighter
    side=1
    x=5
    y=5
    random_traits=no
[/unit]
[unit]
    type=Dwarvish Thunderer
    side=1
    x=5
    y=4
    random_traits=no
[/unit]
[/side]

[side]
side=2
team_name=2
controller=human
canrecruit=yes
gold=0
income=0
fog=no
village_gold=2
team_lock=yes
[unit]
    type=Dwarvish Fighter
    side=2
    x=9
    y=3
    random_traits=no
[/unit]
[unit]
    type=Dwarvish Fighter
    side=2
    x=9
    y=5
    random_traits=no
[/unit]
[unit]
    type=Dwarvish Thunderer
    side=2
    x=9
    y=4
    random_traits=no
[/unit]
[/side]

[/multiplayer]
