# Capability drill: symmetric small-squad duel, NO recruiting
# (gold=0). Both sides field the same fixed combined-arms trio
# (Spearman / Bowman / Mage) four hexes apart -- contact on turn 1.
# Isolates: focus fire, weapon choice vs counter, ToD timing,
# terrain defense (center forest, flanking hills), withdrawal to
# the two villages for healing.
#
# Pre-placed units carry random_traits=no: the sim's unit model is
# trait-less for placed units, and Wesnoth playback must match it.
[multiplayer]
id=drill_duel
name="Drill: Duel"
description="wesnoth_ai capability drill: fixed 3v3 combined-arms duel, no recruiting."

map_data="{~add-ons/wesnoth_ai/maps/drill_duel.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

[side]
side=1
team_name=1
controller=human
canrecruit=yes
gold=0
income=0
fog=no
village_gold=2
team_lock=yes
[unit]
    type=Spearman
    side=1
    x=3
    y=3
    random_traits=no
[/unit]
[unit]
    type=Bowman
    side=1
    x=3
    y=4
    random_traits=no
[/unit]
[unit]
    type=Mage
    side=1
    x=3
    y=5
    random_traits=no
[/unit]
[/side]

[side]
side=2
team_name=2
controller=human
canrecruit=yes
gold=0
income=0
fog=no
village_gold=2
team_lock=yes
[unit]
    type=Spearman
    side=2
    x=7
    y=3
    random_traits=no
[/unit]
[unit]
    type=Bowman
    side=2
    x=7
    y=4
    random_traits=no
[/unit]
[unit]
    type=Mage
    side=2
    x=7
    y=5
    random_traits=no
[/unit]
[/side]

[/multiplayer]
