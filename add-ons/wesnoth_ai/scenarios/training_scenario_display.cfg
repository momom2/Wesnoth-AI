# training_scenario_display.cfg
# Watch-mode counterpart to training_scenario.cfg.
#
# Identical content, BUT:
#   - id=ai_display          (so `wesnoth --test ai_display` picks it)
#   - turn_stage.lua reads `wesnoth.current.scenario`, sees "display"
#     in the id, and switches to slow-turbo + animations-on prefs so
#     the human watching can follow the game. See lua/turn_stage.lua's
#     set_prefs() for the exact pref values.
#
# Used by: `python main.py --policy transformer --display ...`,
# typically launched via the GUI's "Display 1 game" button.
# Not used by training -- training keeps using ai_training (no anims,
# 10x turbo).

[test]
    id=ai_display
    name="AI Display (watch mode) - Caves of the Basilisk"

    map_file="multiplayer/maps/2p_Caves_of_the_Basilisk.map"

    {DEFAULT_SCHEDULE}
    turns=-1
    victory_when_enemies_defeated=yes

    # Side 1: Knalgan Alliance (controlled by Python AI)
    [side]
        side=1
        controller=ai
        save_id=knalgan_side

        team_name=knalgan
        user_team_name="Knalgan Alliance"

        type=Dwarvish Fighter
        id=knalgan_leader
        name="Knalgan Leader"
        canrecruit=yes

        recruit=Dwarvish Guardsman, Dwarvish Fighter, Dwarvish Ulfserker, Dwarvish Thunderer, Thief, Poacher, Footpad, Gryphon Rider

        gold=100
        village_gold=2
        income=0

        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]

    # Side 2: Drakes (controlled by Python AI)
    [side]
        side=2
        controller=ai
        save_id=drake_side

        team_name=drakes
        user_team_name="Drakes"

        type=Drake Clasher
        id=drake_leader
        name="Drake Leader"
        canrecruit=yes

        recruit=Drake Burner, Drake Clasher, Drake Glider, Drake Fighter, Saurian Skirmisher, Saurian Augur

        gold=100
        village_gold=2
        income=0

        {~add-ons/wesnoth_ai/ai_config.cfg}
    [/side]

    # Same game_id seeding as the training scenario -- the Python side
    # discovers this from the first state frame regardless of which
    # scenario is running.
    [event]
        name=preload
        first_time_only=yes

        [lua]
            code=<<
                math.randomseed(os.time() + math.floor(os.clock() * 1000000))
                local game_id = string.format("g%09d", math.random(1, 999999999))
                wml.variables.game_id = game_id
                std_print("=== AI Display Scenario Starting ===")
                std_print("Game ID: " .. game_id)
            >>
        [/lua]
    [/event]

    # Turn-boundary marker (same as training scenario).
    [event]
        name=turn refresh
        first_time_only=no

        [lua]
            code=<<
                std_print(string.format("=== Turn %d, Side %d ===",
                    wesnoth.current.turn, wesnoth.current.side))
            >>
        [/lua]
    [/event]

    [event]
        name=die
        first_time_only=no

        [filter]
            canrecruit=yes
        [/filter]

        [lua]
            code=<<
                local dead_leader = wesnoth.current.event_context.unit
                std_print(string.format("Leader of side %d has died!", dead_leader.side))

                local remaining_leaders = wesnoth.units.find_on_map({canrecruit = true})
                if #remaining_leaders <= 1 then
                    std_print("=== GAME OVER ===")

                    local winner = 0
                    if #remaining_leaders == 1 then
                        winner = remaining_leaders[1].side
                    end

                    std_print(tostring(winner))

                    wesnoth.wml_actions.endlevel({
                        result = "victory",
                        bonus = false,
                        carryover_percentage = 0
                    })
                end
            >>
        [/lua]
    [/event]

    [event]
        name=victory

        [lua]
            code=<<
                std_print("=== Scenario Complete ===")
            >>
        [/lua]
    [/event]
[/test]
