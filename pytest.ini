[pytest]
# Collect only the project's own tests. kaggle/kaggle_output/ holds
# artifacts pulled from Kaggle runs -- the first Phase-1 notebook
# version accidentally shipped a whole repo clone back, and its
# test_*.py copies collided with the real ones at collection time
# ("import file mismatch"). wesnoth_src/ and the venv are just
# collection noise.
norecursedirs = kaggle wesnoth_src .venv venv .git __pycache__ build dist node_modules

# Two-tier suite (2026-07-18). The default run EXCLUDES tests marked
# `slow` -- full-game / subprocess / threading e2e tests measured at
# >10s each (the MCTS self-play smoke alone was 370s = 55% of the
# suite). Fast tier ~2.5 min, full ~11 min.
#
#   pytest            -> fast tier (run after every change)
#   pytest -m ""      -> EVERYTHING (run before committing sim/
#                        trainer/mask changes and before launching
#                        any training campaign)
#   pytest -m slow    -> slow tier only
#
# The slow tests are regression guards for exactly the bugs that
# otherwise surface six hours into a training run -- skipping them
# is only safe because the full run is mandatory at the two
# checkpoints above (see CLAUDE.md Testing).
addopts = -m "not slow"
markers =
    slow: full-game / subprocess / threading e2e (>10s); excluded from the default run -- see pytest.ini header
