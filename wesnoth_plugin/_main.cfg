#textdomain wesnoth-External_AI

# This addon provides an external AI that communicates with a Python training system

[binary_path]
    path=data/add-ons/External_AI
[/binary_path]

[lua]
    code = <<
        local ai_python = wesnoth.require("~add-ons/External_AI/ai_plugin.lua")
        return function()
            return ai_python
        end
    >>
[/lua]

# Register the AI as a stage
[ai]
    id=external_python_ai
    description=_"External Python AI"
    [stage]
        id=main_loop
        name=external_python_stage
        {AI_CA_GOTO_FILTERED}
        {AI_CA_RECRUITMENT_FILTERED}
        [candidate_action]
            engine=lua
            name=external_python_evaluation
            id=external_python_evaluation
            max_score=300000
            location="~add-ons/External_AI/ai_plugin.lua"
        [/candidate_action]
    [/stage]
[/ai]
