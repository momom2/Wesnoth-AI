# training_scenario.cfg
# Template scenario for AI training

[multiplayer]
    id=ai_training_1v1
    name=_"AI Training Match"
    description=_"1v1 match for AI training"
    experience_modifier=100
    map_file="{MAP_FILE}"

    turns=-1  # Unlimited turns (we'll manage timeout in Python)
    victory_when_enemies_defeated=yes

    {DEFAULT_SCHEDULE}

    # Side 1: Python AI
    [side]
        side=1
        controller=ai
        team_name=team1
        user_team_name=_"AI Team"

        gold={STARTING_GOLD}
        income=2

        type={LEADER_1_TYPE}
        faction={FACTION_1}
        recruit={RECRUIT_LIST_1}

        [ai]
            version=external_python_ai
            {GOAL_SEEK_ENEMY}
        [/ai]
    [/side]

    # Side 2: Opponent AI (built-in or another Python AI)
    [side]
        side=2
        controller=ai
        team_name=team2
        user_team_name=_"Opponent"

        gold={STARTING_GOLD}
        income=2

        type={LEADER_2_TYPE}
        faction={FACTION_2}
        recruit={RECRUIT_LIST_2}

        [ai]
            # Use default AI for opponent (can be changed to another external AI)
            aggression=0.5
            caution=0.5
            grouping=defensive
        [/ai]
    [/side]

    [event]
        name=start

        [message]
            speaker=narrator
            message=_"AI Training Match Started"
        [/message]
    [/event]

    [event]
        name=victory

        [message]
            speaker=narrator
            message=_"Victory!"
        [/message]
    [/event]

    [event]
        name=defeat

        [message]
            speaker=narrator
            message=_"Defeat!"
        [/message]
    [/event]
[/multiplayer]
