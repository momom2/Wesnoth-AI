#textdomain wesnoth-test

# Test scenario for Transformer AI
# Place this file in Wesnoth's data/scenarios/ directory or load as a custom scenario

[scenario]
    id=transformer_ai_test
    name= _ "Transformer AI Test"
    map_file=multiplayer/2p_Aethermaw.map

    {DEFAULT_SCHEDULE}
    turns=50

    [side]
        side=1
        controller=ai
        team_name=team1
        user_team_name= _ "Transformer AI"

        type=Elvish Captain
        id=ai_leader
        name= _ "AI Leader"
        canrecruit=yes

        gold=100
        income=2

        recruit=Elvish Fighter,Elvish Archer,Elvish Shaman

        # Add custom AI using Lua candidate action
        [ai]
            version=10710

            # Main loop stage where our CA will run
            [stage]
                id=main_loop
                name=testing_main_loop
                {AI_CA_GOTO}
                {AI_CA_RECRUITMENT}
                {AI_CA_MOVE_TO_TARGETS}

                # Our custom Transformer AI candidate action
                [candidate_action]
                    engine=lua
                    name=transformer_ai
                    id=transformer_ai
                    max_score=300000
                    location="~add-ons/TransformerAI/lua_ai_bridge.lua"
                [/candidate_action]
            [/stage]
        [/ai]
    [/side]

    [side]
        side=2
        controller=human
        team_name=team2
        user_team_name= _ "Human Player"

        type=Human Commander
        id=human_leader
        name= _ "Human Leader"
        canrecruit=yes

        gold=100
        income=2

        recruit=Spearman,Bowman,Mage
    [/side]

    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Defeat enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of your leader"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    [event]
        name=start
        [message]
            speaker=narrator
            message= _ "Testing Transformer AI integration with Wesnoth"
            image=wesnoth-icon.png
        [/message]
    [/event]
[/scenario]
