[multiplayer]
    id=enclave_micro_isar
    name= _ "2p - Micro Isar"
    map_data="{~add-ons/Mini_Maps_Collection/maps/enclave_micro_isar.map}"
    description= _ "Micro Isar. By enclave."

    turns=-1
    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}
    random_start_time=yes
    experience_modifier=70%
		
#define MINI_ISAR_SIDE
        controller=human
        canrecruit=yes
        gold=50
        income=0
        village_gold=2
        fog=yes
		shroud=no
		allow_player=true
		[ai]
			aggression=0.5
			caution=0.2
            village_value=2
		[/ai]
#enddef

    [side]
		side=1
		team_name="South-West"
        {MINI_ISAR_SIDE}
	[/side]
    [side]
        side=2
        team_name="North-East"
        {MINI_ISAR_SIDE}
	[/side]
    [side]
        no_leader=yes
        side=3
		id=micro_isar_monsters
        team_name=Monsters
        controller=ai
        gold=0
        income=0
        village_gold=0
        shroud=no
        fog=no
		allow_player=false
        [ai]
            aggression=0.3
            caution=0.5
            village_value=2
        [/ai]
    [/side]

	[event]
        name=prestart
        [objectives]
            side=0
            summary= _ "Micro Isar. By enclave.
Part of Mini Isar add-on map pack.
"
            [objective]
                description= _ "Defeat enemy leader.
"
                condition=win
            [/objective]
            [objective]
                description= _ "The death of your leader.
"
                condition=lose
            [/objective]
        [/objectives]
    [/event]

    [event]
        name=turn 1
		first_time_only=yes
		{MI_UNIT_PLACING 3 (Tentacle of the Deep) (2,2)}
		{MI_UNIT_PLACING 3 (Tentacle of the Deep) (4,3)}
		{MI_UNIT_PLACING 3 (Tentacle of the Deep) (6,4)}
	[/event]		
	
[event]
	id=mi_turnrefresh1
        name=turn refresh
        first_time_only=no
        {MODIFY_UNIT (role=monster) moves 0}
[/event]

#undef MINI_ISAR_SIDE
[/multiplayer]
