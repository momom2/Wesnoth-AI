[multiplayer]
    id=enclave_mini_fallenstar_2v2
    name= _ "4p - Mini Fallenstar"
    map_data="{~add-ons/Mini_Maps_Collection/maps/enclave_mini_fallenstar_2v2.map}"
    description= _ "Mini Fallenstar. By enclave."

    turns=-1
    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}
    random_start_time=yes
    experience_modifier=70%
		
#define MINI_FALLENSTAR_SIDE
        controller=human
        canrecruit=yes
        gold=50
        income=0
        village_gold=3
        fog=yes
		shroud=no
		allow_player=true
		[ai]
			aggression=0.5
			caution=0.2
            village_value=2
		[/ai]
#enddef

    [side]
		side=1
		team_name="South-West"
        {MINI_FALLENSTAR_SIDE}
	[/side]
    [side]
        side=2
        team_name="North-East"
        {MINI_FALLENSTAR_SIDE}
	[/side]
	[side]
		side=3
		team_name="North-East"
        {MINI_FALLENSTAR_SIDE}
	[/side]
    [side]
        side=4
        team_name="South-West"
        {MINI_FALLENSTAR_SIDE}
	[/side]
    [side]
        no_leader=yes
        side=5
		id=mini_isar_monsters
        team_name=Monsters
        controller=ai
        gold=0
        income=0
        village_gold=0
        shroud=no
        fog=no
		allow_player=false
        [ai]
            aggression=0.3
            caution=0.5
            village_value=2
        [/ai]
    [/side]

	[event]
        name=prestart
        [objectives]
            side=0
            summary= _ "Mini Fallenstar. By enclave.
Part of Mini Isar Map Pack.
"
            [objective]
                description= _ "Defeat enemy leaders.
"
                condition=win
            [/objective]
            [objective]
                description= _ "The death of your leaders.
"
                condition=lose
            [/objective]
        [/objectives]
    [/event]

    [event]
        name=turn 1
		first_time_only=yes
		{MI_UNIT_PLACING 5 (Tentacle of the Deep) (6,3)}
		{MI_UNIT_PLACING 5 (Tentacle of the Deep) (6,7)}
		{MI_UNIT_PLACING 5 (Tentacle of the Deep) (6,10)}
	[/event]	
[event]
	id=mi_turnrefresh1
        name=turn refresh
        first_time_only=no
        {MODIFY_UNIT (role=monster) moves 0}
[/event]
	
#undef MINI_FALLENSTAR_SIDE
[/multiplayer]
