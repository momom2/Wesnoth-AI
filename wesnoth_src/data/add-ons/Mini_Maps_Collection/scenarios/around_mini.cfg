[multiplayer]
id=around_mini
name="around mini"
description="Mini map for 2 players. Created by RedWind"

map_data="{~add-ons/Mini_Maps_Collection/maps/around_mini.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

[side]
side=1
team_name=1
controller=human
canrecruit=yes
gold=75
income=0
fog=no
village_gold=3
team_lock=yes
[/side]

[side]
side=2
team_name=2
controller=human
canrecruit=yes
gold=75
income=0
fog=no
village_gold=3
team_lock=yes
[/side]

[event]
name=prestart
[objectives]
	side=0
	summary=_ "Created by RedWind"
	[objective]
		description= _ "Death of the enemy leader."
		condition=win
	[/objective]
	[objective]
		description= _ "Death of your leader."
		condition=lose
	[/objective]
[/objectives]
[/event]

#define MY_CREATE_UNIT TYPE SIDE X Y FLOOR
    [unit]
        type={TYPE}
        side={SIDE}
        x={X}
        y={Y}
        ai_special=guardian
        random_traits=no
        upkeep=free
        [modifications]
            [object]
                silent=yes
                duration=forever
                [filter]
                    X={X}
                    Y={Y}
                    type={TYPE}
                [/filter]
                [effect]
                    apply_to=movement_costs
                    replace=true
                    [movement_costs]
                        {FLOOR}=99
                    [/movement_costs]
                [/effect]
            [/object]
        [/modifications]
    [/unit]
#enddef

[event]
name=start
{MY_CREATE_UNIT "Tentacle of the Deep" 2 5 6 castle}
[/event]


[/multiplayer]
#undef MY_CREATE_UNIT
