[multiplayer]
    id=szdik570_mini_map
    name= _ "4p - szdik570 Mini Map 4 villages"
    map_data="{~add-ons/Mini_Maps_Collection/maps/szdik570_mini_4v.map}"
    description= _ "Mini Map. By szdik570."

    turns=-1
    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}
    random_start_time=yes
    experience_modifier=70%
		
#define MINI_ISAR_SIDE
        controller=human
        canrecruit=yes
        gold=50
        income=0
        village_gold=2
        fog=yes
		shroud=no
		allow_player=true
		[ai]
			aggression=0.5
			caution=0.2
            village_value=2
		[/ai]
#enddef

    [side]
		side=1
		team_name="South"
        {MINI_ISAR_SIDE}
	[/side]
    [side]
        side=2
        team_name="North"
        {MINI_ISAR_SIDE}
	[/side]
	[side]
		side=3
		team_name="North"
        {MINI_ISAR_SIDE}
	[/side]
    [side]
        side=4
        team_name="South"
        {MINI_ISAR_SIDE}
	[/side]
 
	[event]
        name=prestart
        [objectives]
            side=0
            summary= _ "Mini Map. By szdik570.
Part of Mini Isar add-on map pack by enclave.
Please visit:<b><span color='#00AAAA'> http://forums.wesnoth.org/viewtopic.php?f=19&amp;t=47685 </span></b>if you want your map to become part of this map pack or if you are an author of one of these maps and want to change something.
"
            [objective]
                description= _ "Defeat enemy leaders.
"
                condition=win
            [/objective]
            [objective]
                description= _ "The death of your leaders.
"
                condition=lose
            [/objective]
        [/objectives]
    [/event]

#undef MINI_ISAR_SIDE
[/multiplayer]
