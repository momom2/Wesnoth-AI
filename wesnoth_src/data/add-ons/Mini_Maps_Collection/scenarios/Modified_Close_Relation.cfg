[multiplayer]
id=Modified_Tiny_Close_Relation
name="Modified Close Relation (2p)"
description="The Close Relation
Part of the Tiny Maps Pack
For 2 players

Created by Belbog. Edited by RedWind"

map_data="{~add-ons/Mini_Maps_Collection/maps/Modified_Close_Relation.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

#define MY_CREATE_UNIT TYPE SIDE X Y FLOOR
    [unit]
        type={TYPE}
        side={SIDE}
        x={X}
        y={Y}
        ai_special=guardian
        random_traits=no
        upkeep=free
        [modifications]
            [object]
                silent=yes
                duration=forever
                [filter]
                    X={X}
                    Y={Y}
                    type={TYPE}
                [/filter]
                [effect]
                    apply_to=movement_costs
                    replace=true
                    [movement_costs]
                        {FLOOR}=99
                    [/movement_costs]
                [/effect]
            [/object]
        [/modifications]
    [/unit]
#enddef

[side]
side=1
team_name=1
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=3
team_lock=yes
[/side]

[side]
side=2
team_name=2
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=3
team_lock=yes
[/side]

[side]
side=3
team_name=3
controller=ai
canrecruit=yes
gold=0
income=0
fog=no
village_gold=0
no_leader=yes
allow_player=false
team_lock=true
[/side]

[event]
name=prestart
[objectives]
	side=0
	summary=_ "Created by Belbog. Edited by RedWind"
	[objective]
		description= _ "Death of the enemy leader."
		condition=win
	[/objective]
	[objective]
		description= _ "Death of your leader."
		condition=lose
	[/objective]
[/objectives]
[/event]

[event]
name=start
{MY_CREATE_UNIT "Tentacle of the Deep" 3 3 2 castle}
[/event]
#undef MY_CREATE_UNIT
[/multiplayer]
