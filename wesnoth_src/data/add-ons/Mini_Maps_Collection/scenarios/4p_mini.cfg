[multiplayer]
id=4p_mini
name="4p mini"
description="Mini map for 4 players. Created by RedWind"

map_data="{~add-ons/Mini_Maps_Collection/maps/4p_mini.map}"
{DEFAULT_SCHEDULE}
{DEFAULT_MUSIC_PLAYLIST}

#define MY_CREATE_UNIT TYPE SIDE X Y
    [unit]
        type={TYPE}
        side={SIDE}
        x={X}
        y={Y}
        ai_special=guardian
        random_traits=no
        upkeep=free
        [modifications]
            [object]
                silent=yes
                duration=forever
                [filter]
                    X={X}
                    Y={Y}
                    type={TYPE}
                [/filter]
            [/object]
        [/modifications]
    [/unit]
#enddef

[side]
side=1
team_name=West
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[side]
side=2
team_name=East
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[side]
side=3
team_name=East
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[side]
side=4
team_name=West
controller=human
canrecruit=yes
gold=40
income=0
fog=no
village_gold=2
team_lock=yes
[/side]

[side]
side=5
team_name=5
controller=ai
canrecruit=yes
gold=0
income=0
fog=no
village_gold=0
no_leader=yes
allow_player=false
team_lock=true
[/side]


[event]
name=prestart
[objectives]
	side=0
	summary=_ "Created by RedWind"
	[objective]
		description= _ "Death of the enemy leader."
		condition=win
	[/objective]
	[objective]
		description= _ "Death of your leader."
		condition=lose
	[/objective]
[/objectives]
[/event]

[event]
name=start
{MY_CREATE_UNIT "Tentacle of the Deep" 5 3 4}
{MY_CREATE_UNIT "Tentacle of the Deep" 5 4 4}
{MY_CREATE_UNIT "Tentacle of the Deep" 5 5 5}
{MY_CREATE_UNIT "Tentacle of the Deep" 5 6 5}
[/event]

[/multiplayer]
#undef MY_CREATE_UNIT
