[multiplayer]
    id=Benji_Autumn_Siege_small
    name= _ "2p - Benji Autumn Siege small"
    map_data="{~add-ons/Mini_Maps_Collection/maps/Benji_Autumn_Siege_small.map}"
    description= _ "Autumn Siege. By Benji."

    turns=-1
    {DEFAULT_SCHEDULE}
    {DEFAULT_MUSIC_PLAYLIST}
    random_start_time=yes
    experience_modifier=70%
		
#define MINI_ISAR_SIDE
        controller=human
        canrecruit=yes
        gold=100
        income=0
        village_gold=2
        fog=yes
		shroud=no
		allow_player=true
		[ai]
			aggression=0.5
			caution=0.2
            village_value=2
		[/ai]
#enddef

    [side]
		side=1
		team_name="North-West"
        {MINI_ISAR_SIDE}
	[/side]
    [side]
        side=2
        team_name="South-East"
        {MINI_ISAR_SIDE}
	[/side]
  

	[event]
        name=prestart
        [objectives]
            side=0
            summary= _ "Autumn Siege. By Benji.
Part of Mini Isar add-on map pack by enclave.
Please visit:<b><span color='#00AAAA'> http://forums.wesnoth.org/viewtopic.php?f=19&amp;t=47685 </span></b>if you want your map to become part of this map pack or if you are an author of one of these maps and want to change something.
"
            [objective]
                description= _ "Defeat enemy leader.
"
                condition=win
            [/objective]
            [objective]
                description= _ "The death of your leader.
"
                condition=lose
            [/objective]
        [/objectives]
    [/event]

#undef MINI_ISAR_SIDE
[/multiplayer]
